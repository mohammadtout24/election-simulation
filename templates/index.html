<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebanon Election Results Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            background-color: #f4f6f9;
        } 
        
        /* --- SIDEBAR STYLING --- */
        .sidebar {
            height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #e0e4e8;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 50;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #e0e4e8;
            background: #ffffff;
        }

        .sidebar-title {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }

        .district-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-bottom: 2rem;
        }

        .district-item {
            display: block;
            padding: 12px 24px;
            color: #495057;
            text-decoration: none;
            border-bottom: 1px solid #f8f9fa;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .district-item:hover {
            background-color: #f1f3f5;
            color: #0d6efd;
            padding-left: 30px; 
            border-left: 4px solid #0d6efd;
        }

        .btn-year {
            width: 48%;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 0;
        }

        /* --- MAP AREA STYLING --- */
        .map-container {
            position: relative;
            height: 100vh;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Make main map fill the space entirely */
        #main-map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute; z-index:-1;">
  <defs>
    <pattern id="greenStripes" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="12" fill="#FFEB3B" /> <line x1="6" y1="0" x2="6" y2="12" stroke="#1B5E20" stroke-width="3" /> </pattern>
  </defs>
</svg>

<div class="container-fluid p-0">
    <div class="row g-0">
        
        <div class="col-md-3 col-lg-2 sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Elections <span class="text-primary">{{ current_year }}</span></div>
                <div class="d-flex justify-content-between">
                    <a href="/?year=2018" class="btn btn-sm btn-year {{ 'btn-primary' if current_year == '2018' else 'btn-outline-secondary' }}">2018</a>
                    <a href="/?year=2022" class="btn btn-sm btn-year {{ 'btn-primary' if current_year == '2022' else 'btn-outline-secondary' }}">2022</a>
                </div>
            </div>

            <div class="district-list">
                {% for region in regions %}
                <a href="/region/{{ region.slug }}?year={{ current_year }}" class="district-item">
                    {{ region.district_label }}
                </a>
                {% endfor %}
            </div>
        </div>

        <div class="col-md-9 col-lg-10 map-container">
            <div id="main-map"></div>
        </div>
    </div>
</div>

<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

<script>
    // Load the JSON data generated by Python
    const mainMapData = {{ map_json | safe }};
    const currentYear = "{{ current_year }}";

    // This function intercepts Plotly's rendering and replaces yellow with stripes
    function applyStripes() {
        document.querySelectorAll('path').forEach(p => {
            let fill = p.style.fill || p.getAttribute('fill');
            if (fill) {
                // Check if the area is colored Yellow (#FFEB3B or rgb(255, 235, 59))
                let safeFill = fill.replace(/\s/g, '').toLowerCase();
                if (safeFill.includes('255,235,59') || safeFill.includes('#ffeb3b')) {
                    // Paint it with our custom SVG stripes!
                    p.style.fill = 'url(#greenStripes)';
                }
            }
        });
    }
    
    function setupInteractiveMap(divId, figureData) {
        if (!figureData || !figureData.data || figureData.data.length === 0) {
            document.getElementById(divId).innerHTML = "<div class='text-muted mt-5 text-center'>Map Data Missing</div>";
            return;
        }

        // Render the Plotly chart
        Plotly.newPlot(divId, figureData.data, figureData.layout, {
            displayModeBar: false,
            responsive: true,
            scrollZoom: true 
        }).then(() => {
            // Apply stripes immediately after it finishes drawing
            setTimeout(applyStripes, 100);
        });
        
        // Handle click events to navigate
        document.getElementById(divId).on('plotly_click', function(data){
            if(data.points.length > 0) {
                const regionSlug = data.points[0].location;
                window.location.href = `/region/${regionSlug}?year=${currentYear}`;
            }
        });
        
        document.getElementById(divId).on('plotly_hover', function(data){
            document.getElementById(divId).style.cursor = 'pointer';
        });

        document.getElementById(divId).on('plotly_unhover', function(data){
            document.getElementById(divId).style.cursor = 'default';
        });
    }

    // Initialize the single map
    setupInteractiveMap('main-map', mainMapData);

    // Because Plotly sometimes redraws the map when you zoom or un-hover, 
    // we set a tiny interval to make sure the stripes are always protected.
    setInterval(applyStripes, 200);
</script>

</body>
</html>
